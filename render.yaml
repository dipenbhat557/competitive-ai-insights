# CodePulse AI - Render Blueprint
#
# One-shot deploy: in the Render dashboard go to "New +" -> "Blueprint",
# point it at this repo, and Render provisions the API + Postgres in one pass.
#
# After the first deploy, fill in the `sync: false` envs in the Render
# dashboard (GEMINI_API_KEY, OAuth client ids, etc).  Everything else is
# wired automatically.

services:
  - type: web
    name: codepulse-api
    runtime: docker
    region: oregon            # change if you prefer (frankfurt, singapore, ohio, virginia)
    plan: starter             # $7/mo - free tier doesn't keep docker workloads warm
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Wired automatically from the managed Postgres below.
      - key: DATABASE_URL
        fromDatabase:
          name: codepulse-db
          property: connectionString

      # JWT signing key - generated once, persisted by Render.
      - key: SECRET_KEY
        generateValue: true

      # Production frontend origin(s). Comma-separate to allow more than one
      # (e.g. add an apex/www variant). Vercel preview deploys are covered by
      # a regex in app/main.py so you don't need to list them here.
      - key: FRONTEND_URL
        value: https://project.dipen.info

      # Static defaults; safe to leave as-is.
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # Secrets you fill in via the Render dashboard after the first deploy.
      - key: GEMINI_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

databases:
  - name: codepulse-db
    plan: free                # 90-day free tier, then $7/mo
    region: oregon            # keep same region as the web service
    postgresMajorVersion: "16"
